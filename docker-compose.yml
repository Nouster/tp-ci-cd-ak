services:
  db:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: appdb
      MYSQL_USER: appuser
      MYSQL_PASSWORD: apppassword
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend-tp_ci_cd/Dockerfile
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: mysql+pymysql://appuser:apppassword@db:3306/appdb
      FLASK_DEBUG: "true"
    volumes:
      - ./backend-tp_ci_cd:/app
      - ./requirements.txt:/app/requirements.txt
      - .:/workspace
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: frontend-tp_ci_cd/Dockerfile
    restart: unless-stopped
    ports:
      - "5001:5001"
    environment:
      BACKEND_URL: http://backend:5000
      FLASK_DEBUG: "true"
      SECRET_KEY: change-me-in-production
    volumes:
      - ./frontend-tp_ci_cd:/app
      - ./requirements.txt:/app/requirements.txt
    depends_on:
      - backend

volumes:
  db_data:
